<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" role="img" aria-labelledby="title desc">
  <title id="title">Object-Centric Risk Analysis Pipeline</title>
  <desc id="desc">Risk description and image lead to object extraction, grouping into victims and objects, victim-object pair scoring, and victim risk scores. If no victim is found, risk is zero.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1800" height="900" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="900" y="84" text-anchor="middle" font-size="44" font-weight="750" fill="#111827">Object-Centric Risk Analysis Pipeline</text>
    <text x="900" y="124" text-anchor="middle" font-size="20" fill="#64748b">Detect what is present, identify who or what can be harmed, then score each interaction</text>

    <g filter="url(#shadow)" stroke-width="2">
      <rect x="72" y="310" width="260" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="408" y="310" width="250" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="750" y="190" width="250" height="160" rx="12" fill="#ecfdf5" stroke="#34d399"/>
      <rect x="750" y="460" width="250" height="160" rx="12" fill="#eff6ff" stroke="#60a5fa"/>
      <rect x="1100" y="310" width="270" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="1470" y="310" width="260" height="190" rx="12" fill="#fff7ed" stroke="#fb923c"/>
    </g>

    <g fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
      <path d="M332 405H398"/>
      <path d="M658 405H700V270H740"/>
      <path d="M658 405H700V540H740"/>
      <path d="M1000 270H1045V365H1090"/>
      <path d="M1000 540H1045V445H1090"/>
      <path d="M1370 405H1460"/>
    </g>

    <g text-anchor="middle" fill="#111827">
      <text x="202" y="357" font-size="25" font-weight="740">Inputs</text>
      <rect x="108" y="382" width="188" height="36" rx="6" fill="#eff6ff"/>
      <text x="202" y="407" font-size="18" font-weight="650" fill="#1d4ed8">Risk description</text>
      <rect x="108" y="430" width="188" height="36" rx="6" fill="#f1f5f9"/>
      <text x="202" y="455" font-size="18" font-weight="650" fill="#334155">Scene image</text>

      <text x="533" y="374" font-size="25" font-weight="740">
        <tspan x="533">Extract All</tspan>
        <tspan x="533" dy="32">Objects</tspan>
      </text>
      <text x="533" y="451" font-size="18" fill="#64748b">visible scene entities</text>

      <text x="875" y="250" font-size="25" font-weight="740">Victims</text>
      <text x="875" y="286" font-size="18" fill="#047857">entities that may be harmed</text>
      <text x="875" y="317" font-size="17" fill="#64748b">may be empty</text>

      <text x="875" y="520" font-size="25" font-weight="740">Objects</text>
      <text x="875" y="556" font-size="18" fill="#1d4ed8">entities that may cause risk</text>
      <text x="875" y="587" font-size="17" fill="#64748b">one or more candidates</text>

      <text x="1235" y="369" font-size="25" font-weight="740">
        <tspan x="1235">Victim-Object</tspan>
        <tspan x="1235" dy="32">Pair Scoring</tspan>
      </text>
      <text x="1235" y="448" font-size="18" fill="#64748b">risk(victim, object)</text>

      <text x="1600" y="369" font-size="25" font-weight="740">
        <tspan x="1600">Risk Score</tspan>
        <tspan x="1600" dy="32">per Victim</tspan>
      </text>
      <text x="1600" y="448" font-size="18" fill="#c2410c">with respect to each object</text>

    </g>

    <g font-size="17" font-weight="700" text-anchor="middle">
      <rect x="676" y="372" width="76" height="34" rx="17" fill="#dbeafe"/>
      <text x="714" y="395" fill="#1d4ed8">group</text>
    </g>
  </g>
</svg>
