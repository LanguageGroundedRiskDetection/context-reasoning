<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" role="img" aria-labelledby="title desc">
  <title id="title">Simple Victim-Affordance Risk Pipeline</title>
  <desc id="desc">A simple pipeline from risk description to victims, affordances, observed objects, classification, aggregation, and final score.</desc>
  <rect width="1800" height="900" fill="#f8fafc"/>
  <text x="900" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="750" fill="#111827">Simple Victim-Affordance Risk Pipeline</text>
  <g font-family="Inter, Arial, sans-serif">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
      </marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
      </filter>
    </defs>

    <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)">
      <rect x="80" y="318" width="210" height="165" rx="18"/>
      <rect x="345" y="318" width="210" height="165" rx="18"/>
      <rect x="610" y="318" width="220" height="165" rx="18"/>
      <rect x="885" y="318" width="220" height="165" rx="18"/>
      <rect x="1160" y="318" width="240" height="165" rx="18"/>
      <rect x="1455" y="318" width="250" height="165" rx="18"/>
      <rect x="750" y="632" width="300" height="145" rx="18" stroke="#2563eb"/>
    </g>

    <g stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow)" stroke-linecap="round">
      <path d="M290 400 H335"/>
      <path d="M555 400 H600"/>
      <path d="M830 400 H875"/>
      <path d="M1105 400 H1150"/>
      <path d="M1400 400 H1445"/>
      <path d="M1580 483 C1580 592 1060 585 955 645"/>
    </g>

    <g text-anchor="middle" fill="#111827">
      <text x="185" y="374" font-size="25" font-weight="730">
        <tspan x="185" dy="0">Risk</tspan>
        <tspan x="185" dy="31">Description</tspan>
      </text>
      <text x="185" y="440" font-size="18" fill="#64748b">e.g., choking hazard</text>

      <text x="450" y="392" font-size="25" font-weight="730">Victims</text>
      <text x="450" y="440" font-size="18" fill="#64748b">baby, human, robot</text>

      <text x="720" y="374" font-size="25" font-weight="730">
        <tspan x="720" dy="0">Derived</tspan>
        <tspan x="720" dy="31">Affordances</tspan>
      </text>
      <text x="720" y="440" font-size="18" fill="#64748b">swallowable, pickable</text>

      <text x="995" y="374" font-size="25" font-weight="730">
        <tspan x="995" dy="0">Observed</tspan>
        <tspan x="995" dy="31">Objects</tspan>
      </text>
      <text x="995" y="440" font-size="18" fill="#64748b">scene descriptions</text>

      <text x="1280" y="374" font-size="25" font-weight="730">
        <tspan x="1280" dy="0">Affordance</tspan>
        <tspan x="1280" dy="31">Classification</tspan>
      </text>
      <text x="1280" y="440" font-size="18" fill="#64748b">object x scores</text>

      <text x="1580" y="374" font-size="25" font-weight="730">
        <tspan x="1580" dy="0">Aggregate</tspan>
        <tspan x="1580" dy="31">to Victims</tspan>
      </text>
      <text x="1580" y="440" font-size="18" fill="#64748b">victim-level evidence</text>

      <text x="900" y="692" font-size="31" font-weight="760">Final Risk Score</text>
      <text x="900" y="735" font-size="21" fill="#64748b">level + uncertainty</text>
    </g>
  </g>
</svg>
